<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 4th Anniversary ❤️</title>
    <style>
        /* CSS สำหรับตกแต่ง */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            z-index: 1;
        }

        h1 { color: #d81b60; margin-bottom: 10px; }
        p { color: #555; }

        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ad1457;
            margin: 20px 0;
        }

        .heart {
            font-size: 50px;
            color: #e91e63;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .surprise-btn {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .surprise-btn:hover { background-color: #f50057; }

        #message {
            display: none;
            margin-top: 20px;
            animation: fadeIn 2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* หัวใจร่วงหล่น */
        .falling-heart {
            position: fixed;
            top: -10%;
            font-size: 20px;
            z-index: 0;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart">❤️</div>
        <h1>Happy 4th Month!</h1>
        <p>เราเดินทางด้วยกันมาแล้ว...</p>
        
        <div class="timer" id="timer">กำลังคำนวณวันเวลา...</div>

        <p>ขอบคุณที่อยู่ข้างกันนะ</p>
        
        <button class="surprise-btn" onclick="showSurprise()">กดเพื่อดูเซอร์ไพรส์ 🎁</button>

        <div id="message">
            <hr>
            <h3>ถึง INK </h3>
            <p>Happy 4th Month Anniversary ❤️</p>
            <div style="margin-top: 25px;">
                <a href="https://youtu.be/py4E_tlNMQ8" target="_blank" style="text-decoration: none;">
                    <div style="background: white; border-radius: 15px; padding: 15px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ff4081;">
                        <div style="font-size: 40px; margin-right: 15px;">🎵</div>
                        <div style="text-align: left;">
                            <div style="font-weight: bold; color: #d81b60;">กดเพื่อฟังเพลง</div>
                        </div>
                    </div>
                </a>
            <p style="font-size: 0.8rem; color: #999; margin-top: 10px;">(กดแล้วเพลงจะเปิดใน YouTube นะครับ)</p>
        </div>    
    </div>

    <script>
        // 1. ตั้งค่าวันที่เริ่มคบกัน (ปี, เดือน-1, วัน) 
        // เช่น คบกันวันที่ 23 พฤศจิกายน 2025 ให้ใส่ (2025, 10, 23)
        const startDate = new Date(2025, 10, 11); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById('timer').innerHTML = 
                `${days} วัน ${hours} ชั่วโมง ${mins} นาที ${secs} วินาที`;
        }

        setInterval(updateTimer, 1000);

        function showSurprise() {
            // 1. แสดงข้อความเซอร์ไพรส์
            document.getElementById('message').style.display = 'block';
    
            // 2. สั่งให้หัวใจร่วง (ฟังก์ชันเดิมที่คุณมี)
            createHearts();

            // 3. สั่งให้ YouTube เล่นเพลงอัตโนมัติ (เปลี่ยน VIDEO_ID เป็นไอดีเพลงของคุณ)
            const videoId = 'YOUR_VIDEO_ID_HERE'; // <--- แก้ตรงนี้
            const player = document.getElementById('youtubePlayer');
            player.src = "https://www.youtube.com/embed/py4E_tlNMQ8?autoplay=1";
        }

        // ฟังก์ชันสร้างหัวใจร่วง
        function createHearts() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('falling-heart');
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = Math.random() * 3 + 2 + 's';
                    heart.style.opacity = Math.random();
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 5000);
                }, i * 200);
            }
        }
    </script>
</body>
</html>
